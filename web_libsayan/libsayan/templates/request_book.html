{% extends 'base.html' %}
{% block content %}
<h1>Запрос книги "{{ book.title }}"</h1>
<form method="post">
    {% csrf_token %}
    <p>Вы действительно хотите запросить эту книгу?</p>
    <button type="submit" class="btn">Отправить запрос</button>
    <a href="{% url 'book_detail' book.id %}" class="btn">Назад</a>
</form>
{% endblock %}
